<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Share</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#0f172a;
  color:white;
  min-height:100vh;
}

/* ===== HEADER ===== */

header{
  padding:30px 20px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

header h1{
  font-size:42px;
  margin-bottom:10px;
}

header p{
  color:#dbeafe;
}

/* ===== MAIN ===== */

.container{
  max-width:1000px;
  margin:auto;
  padding:25px;
}

.section-title{
  font-size:28px;
  margin-bottom:20px;
}

/* ===== FILE CARD ===== */

.files{
  display:grid;
  gap:20px;
}

.file-card{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:20px;
  padding:20px;
  transition:0.2s;
}

.file-card:hover{
  transform:translateY(-4px);
  border-color:#60a5fa;
}

.file-card h2{
  margin-bottom:10px;
}

.file-card a{
  text-decoration:none;
  color:#60a5fa;
}

/* ===== INFO BOXES ===== */

.info-grid{
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.info-box{
  background:#111827;
  border-radius:20px;
  padding:20px;
  border:1px solid #1f2937;
}

.info-box h3{
  margin-bottom:10px;
}

/* ===== FLOAT BUTTON ===== */

.add-btn{
  position:fixed;
  right:25px;
  bottom:25px;
  width:70px;
  height:70px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:white;
  font-size:40px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.2s;
}

.add-btn:hover{
  transform:scale(1.08);
}

/* ===== POPUP ===== */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  width:90%;
  max-width:400px;
  background:#1e293b;
  border-radius:25px;
  padding:25px;
  border:1px solid #334155;
}

.popup-content h2{
  margin-bottom:20px;
}

.input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:none;
  border-radius:12px;
  background:#0f172a;
  color:white;
}

.save-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.save-btn:hover{
  background:#2563eb;
}

/* ===== FOOTER ===== */

footer{
  margin-top:50px;
  padding:30px;
  text-align:center;
  color:#94a3b8;
}
</style>
</head>
<body>

<header>
  <h1>📚 Class Share</h1>
  <p>クラス用ファイル共有サイト</p>
</header>

<div class="container">

  <h2 class="section-title">🔥 最新のファイル</h2>

  <div class="files" id="files">

    <div class="file-card">
      <h2>数学まとめ</h2>
      <a href="#">ファイルを開く</a>
    </div>

  </div>

  <div class="info-grid">

    <div class="info-box">
      <h3>📢 お知らせ</h3>
      <p>テスト範囲を追加しました。</p>
    </div>

    <div class="info-box">
      <h3>📅 次の提出</h3>
      <p>英語ワーク 金曜日まで</p>
    </div>

    <div class="info-box">
      <h3>📁 ファイル数</h3>
      <p id="fileCount">1 files</p>
    </div>

  </div>

</div>

<!-- FLOAT BUTTON -->
<button class="add-btn" onclick="openPopup()">＋</button>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">

    <h2>ファイル追加</h2>

    <input class="input" id="fileName" placeholder="表示する名前">

    <input class="input" id="fileLink" placeholder="ファイルのリンク">

    <button class="save-btn" onclick="addFile()">
      追加
    </button>

  </div>
</div>

<footer>
  © 2026 Class Share
</footer>

<script>
const popup = document.getElementById("popup");
const files = document.getElementById("files");
const fileCount = document.getElementById("fileCount");

function openPopup(){
  popup.style.display = "flex";
}

popup.addEventListener("click",(e)=>{
  if(e.target === popup){
    popup.style.display = "none";
  }
});

function addFile(){

  const name = document.getElementById("fileName").value;
  const link = document.getElementById("fileLink").value;

  if(name === "" || link === ""){
    alert("入力してください");
    return;
  }

  const card = document.createElement("div");
  card.className = "file-card";

  card.innerHTML = `
    <h2>${name}</h2>
    <a href="${link}" target="_blank">ファイルを開く</a>
  `;

  files.prepend(card);

  fileCount.innerText =
    document.querySelectorAll(".file-card").length + " files";

  document.getElementById("fileName").value = "";
  document.getElementById("fileLink").value = "";

  popup.style.display = "none";
}
</script>

</body>
</html>
