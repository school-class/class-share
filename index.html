<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Share</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#060816;
  color:white;
  overflow-x:hidden;
}

/* ===== BACKGROUND ===== */

.bg{
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top left,#3b82f650,transparent 30%),
  radial-gradient(circle at bottom right,#8b5cf650,transparent 30%),
  #060816;
  z-index:-1;
}

/* ===== HEADER ===== */

header{
  padding:80px 8%;
}

.logo{
  font-size:18px;
  color:#94a3b8;
  margin-bottom:20px;
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:50px;
  flex-wrap:wrap;
}

.hero-text h1{
  font-size:72px;
  line-height:1;
  margin-bottom:25px;
  letter-spacing:-3px;
}

.hero-text p{
  font-size:20px;
  color:#94a3b8;
  max-width:600px;
  line-height:1.7;
}

.hero-card{
  width:320px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:30px;
  padding:30px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.hero-card h2{
  margin-bottom:15px;
}

.hero-card p{
  color:#94a3b8;
  line-height:1.7;
}

/* ===== MAIN ===== */

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

.section-title{
  font-size:32px;
  margin-bottom:30px;
  letter-spacing:-1px;
}

/* ===== FILE GRID ===== */

.file-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.file-card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  padding:28px;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.file-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#3b82f620,transparent);
  opacity:0;
  transition:0.3s;
}

.file-card:hover::before{
  opacity:1;
}

.file-card:hover{
  transform:translateY(-8px);
  border-color:#60a5fa;
}

.file-icon{
  font-size:40px;
  margin-bottom:18px;
}

.file-card h2{
  margin-bottom:12px;
  font-size:24px;
}

.file-card p{
  color:#94a3b8;
  line-height:1.7;
  margin-bottom:20px;
}

.file-card a{
  text-decoration:none;
  color:#60a5fa;
  font-weight:600;
}

/* ===== INFO SECTION ===== */

.bottom{
  margin-top:80px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
}

.info{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:25px;
  padding:25px;
}

.info h3{
  margin-bottom:15px;
}

.info p{
  color:#94a3b8;
  line-height:1.7;
}

/* ===== FLOAT BUTTON ===== */

.add-btn{
  position:fixed;
  right:30px;
  bottom:30px;
  width:80px;
  height:80px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:white;
  font-size:42px;
  cursor:pointer;
  box-shadow:0 15px 40px rgba(59,130,246,0.4);
  transition:0.3s;
}

.add-btn:hover{
  transform:scale(1.08) rotate(90deg);
}

/* ===== POPUP ===== */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.popup-box{
  width:100%;
  max-width:450px;
  background:#111827;
  border-radius:35px;
  padding:35px;
  border:1px solid rgba(255,255,255,0.08);
  animation:show 0.25s ease;
}

@keyframes show{
  from{
    transform:translateY(20px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

.popup-box h2{
  margin-bottom:25px;
  font-size:30px;
}

.input{
  width:100%;
  padding:18px;
  margin-bottom:18px;
  border:none;
  border-radius:18px;
  background:#1e293b;
  color:white;
  font-size:15px;
}

.input:focus{
  outline:2px solid #3b82f6;
}

.submit{
  width:100%;
  padding:18px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.submit:hover{
  opacity:0.9;
}

/* ===== FOOTER ===== */

footer{
  padding:60px 20px;
  text-align:center;
  color:#64748b;
  margin-top:80px;
}

</style>
</head>
<body>

<div class="bg"></div>

<header>

  <div class="logo">Nova Share</div>

  <div class="hero">

    <div class="hero-text">
      <h1>Share<br>Everything.</h1>
      <p>
        クラス用のスタイリッシュな
        ファイル共有スペース。
        最新ファイルをすぐ共有。
      </p>
    </div>

    <div class="hero-card">
      <h2>⚡ Fast Access</h2>
      <p>
        学校iPadでも軽く動くように
        シンプルで高速な構成。
      </p>
    </div>

  </div>

</header>

<div class="container">

  <h2 class="section-title">最新のファイル</h2>

  <div class="file-grid" id="files">

    <div class="file-card">
      <div class="file-icon">📘</div>
      <h2>数学まとめ</h2>
      <p>テスト範囲と重要ポイント。</p>
      <a href="#">Open File →</a>
    </div>

  </div>

  <div class="bottom">

    <div class="info">
      <h3>📢 Updates</h3>
      <p>
        最新ファイルは自動で
        一番上に表示されます。
      </p>
    </div>

    <div class="info">
      <h3>📂 Files</h3>
      <p id="count">1 files uploaded</p>
    </div>

    <div class="info">
      <h3>🚀 System</h3>
      <p>
        軽量デザインで高速表示。
      </p>
    </div>

  </div>

</div>

<button class="add-btn" onclick="openPopup()">+</button>

<div class="popup" id="popup">

  <div class="popup-box">

    <h2>New File</h2>

    <input
      class="input"
      id="fileName"
      placeholder="表示する名前">

    <input
      class="input"
      id="fileDesc"
      placeholder="説明">

    <input
      class="input"
      id="fileLink"
      placeholder="ファイルリンク">

    <button
      class="submit"
      onclick="addFile()">
      Add File
    </button>

  </div>

</div>

<footer>
  © 2026 Nova Share
</footer>

<script>

const popup = document.getElementById("popup");
const files = document.getElementById("files");
const count = document.getElementById("count");

function openPopup(){
  popup.style.display = "flex";
}

popup.addEventListener("click",(e)=>{
  if(e.target === popup){
    popup.style.display = "none";
  }
});

function addFile(){

  const name =
    document.getElementById("fileName").value;

  const desc =
    document.getElementById("fileDesc").value;

  const link =
    document.getElementById("fileLink").value;

  if(name === "" || link === ""){
    alert("入力してください");
    return;
  }

  const card = document.createElement("div");

  card.className = "file-card";

  card.innerHTML = `
    <div class="file-icon">📄</div>
    <h2>${name}</h2>
    <p>${desc}</p>
    <a href="${link}" target="_blank">
      Open File →
    </a>
  `;

  files.prepend(card);

  count.innerText =
    document.querySelectorAll(".file-card").length
    + " files uploaded";

  document.getElementById("fileName").value = "";
  document.getElementById("fileDesc").value = "";
  document.getElementById("fileLink").value = "";

  popup.style.display = "none";
}

</script>

</body>
</html>
